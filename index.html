document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 color:#334155; text-decoration:none\" style-hover=\"color:#0d9488\">Features<\u002Fa>\n        <a href=\"#verticals\" class=\"rf-navlink\" style=\"font-size:14px; font-weight:600; color:#334155; text-decoration:none\" style-hover=\"color:#0d9488\">Who it's for<\u002Fa>\n        <a href=\"#pricing\" class=\"rf-navlink\" style=\"font-size:14px; font-weight:600; color:#334155; text-decoration:none\" style-hover=\"color:#0d9488\">Pricing<\u002Fa>\n        <a href=\"#faq\" class=\"rf-navlink\" style=\"font-size:14px; font-weight:600; color:#334155; text-decoration:none\" style-hover=\"color:#0d9488\">FAQ<\u002Fa>\n        <a href=\"https://reviewflow.raydenai.com/\" style=\"font-size:14px; font-weight:700; color:#fff; background:#0d9488; padding:11px 20px; border-radius:10px; text-decoration:none\" style-hover=\"background:#0b7c72\">{{ ctaLabel }}<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Hero -->\n  <div data-screen-label=\"Hero\" id=\"top\" style=\"background:linear-gradient(180deg,#f8fafc 0%,#ffffff 100%); overflow:hidden\">\n    <div class=\"rf-hero-grid\" style=\"max-width:1140px; margin:0 auto; padding:72px 32px 24px 32px; display:grid; grid-template-columns:1.05fr 0.95fr; gap:48px; align-items:center\">\n      <div>\n        <h1 class=\"rf-h1\" style=\"margin:8px 0 0 0; font-size:54px; line-height:1.08; font-weight:900; letter-spacing:-1.8px\">More Google reviews, without the chasing<\u002Fh1>\n        <p style=\"margin:20px 0 0 0; font-size:18px; line-height:1.6; color:#475569; max-width:520px\">ReviewFlow asks every customer for a review on <strong style=\"color:#0d9488\">WhatsApp<\u002Fstrong> after their visit, and gives unhappy ones a private route to you, so you hear about problems first.<\u002Fp>\n        <div style=\"display:flex; flex-wrap:wrap; align-items:center; gap:16px; margin-top:32px\">\n          <a href=\"https://reviewflow.raydenai.com/\" style=\"font-size:16px; font-weight:700; color:#fff; background:#0d9488; padding:16px 30px; border-radius:12px; text-decoration:none; box-shadow:0 8px 20px rgba(13,148,136,0.28)\" style-hover=\"background:#0b7c72\">{{ ctaLabel }}<\u002Fa>\n          <a href=\"#how\" style=\"font-size:15px; font-weight:600; color:#334155; text-decoration:none; padding:16px 8px\" style-hover=\"color:#0d9488\">See how it works ↓<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:10px; margin-top:22px; font-size:13.5px; color:#64748b\">\n          <span>30 days free<\u002Fspan><span style=\"color:#cbd5e1\">·<\u002Fspan><span>No card required<\u002Fspan><span style=\"color:#cbd5e1\">·<\u002Fspan><span>UK-hosted &amp; GDPR-minded<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rf-hero-vis\" style=\"position:relative; min-height:480px\">\n        <img src=\"ec4059e6-7892-416a-803b-e2e86ea31ff3\" alt=\"A WhatsApp review request from a barbershop, next to a new five-star Google review\" style=\"width:100%; max-width:520px; display:block; animation:rf-float 7s ease-in-out infinite\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- vertical chips -->\n    <div style=\"max-width:1140px; margin:0 auto; padding:8px 32px 56px 32px\">\n      <div style=\"font-size:12px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; color:#94a3b8; text-align:center\">Built for UK local businesses<\u002Fdiv>\n      <div style=\"display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin-top:14px\">\n        <sc-for list=\"{{ chipLabels }}\" as=\"c\" hint-placeholder-count=\"7\">\n          <div style=\"font-size:13.5px; font-weight:600; color:#334155; background:#fff; border:1px solid #e2e8f0; border-radius:99px; padding:8px 16px\">{{ c }}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Pain -->\n  <div data-screen-label=\"Pain\" style=\"background:#0f172a\">\n    <div style=\"max-width:900px; margin:0 auto; padding:80px 32px; text-align:center\">\n      <div style=\"display:flex; justify-content:center; gap:6px; margin-bottom:22px\">\n        <sc-for list=\"{{ fiveStars }}\" as=\"s\" hint-placeholder-count=\"5\">\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 20 20\"><path d=\"M10,1 l2.4,5.6 6,0.5 -4.6,4 1.4,5.9 -5.2,-3.2 -5.2,3.2 1.4,-5.9 -4.6,-4 6,-0.5 Z\" fill=\"#fbbf24\"><\u002Fpath><\u002Fsvg>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div class=\"rf-pain-h\" style=\"font-size:32px; line-height:1.35; font-weight:800; letter-spacing:-0.8px; color:#ffffff\">Your best customers walk out happy, then forget to say so on Google.<br><span style=\"color:#5eead4\">Meanwhile one bad day can go public before you've even heard about it.<\u002Fspan><\u002Fdiv>\n      <p style=\"margin:22px auto 0 auto; font-size:16.5px; line-height:1.65; color:#94a3b8; max-width:620px\">Texts get ignored and emails go unopened. WhatsApp doesn't. ReviewFlow asks at the moment that matters, in the app your customers actually read.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Why reviews matter -->\n  <div data-screen-label=\"Why reviews matter\" style=\"background:#ffffff; border-bottom:1px solid #eef2f4\">\n    <div class=\"rf-sec\" style=\"max-width:1140px; margin:0 auto; padding:88px 32px 80px 32px\">\n      <div style=\"text-align:center; max-width:660px; margin:0 auto\">\n        <div style=\"font-size:13px; font-weight:700; letter-spacing:1.4px; text-transform:uppercase; color:#0d9488\">Why this matters<\u002Fdiv>\n        <h2 class=\"rf-h2\" style=\"margin:12px 0 0 0; font-size:38px; font-weight:800; letter-spacing:-1px\">Your Google reviews are your shop window now<\u002Fh2>\n        <p style=\"margin:14px 0 0 0; font-size:16px; line-height:1.6; color:#64748b\">Before anyone calls, books or walks in, they've read what your last customers said. The numbers are stark:<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"rf-grid4\" style=\"display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:20px; margin-top:52px\">\n        <sc-for list=\"{{ stats }}\" as=\"stat\" hint-placeholder-count=\"4\">\n          <div style=\"background:#f8fafc; border:1px solid #eef2f4; border-radius:18px; padding:30px 26px; text-align:center\">\n            <div class=\"rf-statn\" style=\"font-size:52px; font-weight:900; letter-spacing:-2px; color:#0d9488; line-height:1\">{{ stat.n }}<\u002Fdiv>\n            <div style=\"font-size:14.5px; font-weight:700; color:#0f172a; margin-top:12px; line-height:1.4\">{{ stat.title }}<\u002Fdiv>\n            <div style=\"font-size:13px; line-height:1.55; color:#64748b; margin-top:8px\">{{ stat.body }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"text-align:center; font-size:12.5px; color:#94a3b8; margin-top:22px\">Source: BrightLocal Local Consumer Review Survey, 2025 &amp; 2026 editions<\u002Fdiv>\n      <div style=\"max-width:680px; margin:36px auto 0 auto; text-align:center; background:#e6f4f2; border-radius:16px; padding:22px 30px\">\n        <div style=\"font-size:16.5px; line-height:1.6; color:#0b5f57; font-weight:600\">Put those together: nearly everyone would leave you a review. They just need to be asked at the right moment, somewhere they'll actually see it. That's exactly what ReviewFlow does.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- How it works -->\n  <div data-screen-label=\"How it works\" id=\"how\" style=\"background:#ffffff\">\n    <div class=\"rf-sec\" style=\"max-width:1140px; margin:0 auto; padding:88px 32px\">\n      <div style=\"text-align:center\">\n        <div style=\"font-size:13px; font-weight:700; letter-spacing:1.4px; text-transform:uppercase; color:#0d9488\">How it works<\u002Fdiv>\n        <h2 class=\"rf-h2\" style=\"margin:12px 0 0 0; font-size:38px; font-weight:800; letter-spacing:-1px\">Set it up once. It runs itself.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"rf-grid3\" style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:24px; margin-top:52px\">\n        <sc-for list=\"{{ steps }}\" as=\"st\" hint-placeholder-count=\"3\">\n          <div style=\"background:#f8fafc; border:1px solid #eef2f4; border-radius:18px; padding:32px 30px\">\n            <div style=\"width:40px; height:40px; border-radius:20px; background:#0d9488; color:#fff; font-size:17px; font-weight:800; display:flex; align-items:center; justify-content:center\">{{ st.n }}<\u002Fdiv>\n            <div style=\"font-size:18px; font-weight:700; margin-top:18px\">{{ st.title }}<\u002Fdiv>\n            <div style=\"font-size:14.5px; line-height:1.6; color:#64748b; margin-top:8px\">{{ st.body }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Features -->\n  <div data-screen-label=\"Features\" id=\"features\" style=\"background:#f8fafc\">\n    <div class=\"rf-sec\" style=\"max-width:1140px; margin:0 auto; padding:88px 32px\">\n      <div style=\"text-align:center; max-width:640px; margin:0 auto\">\n        <div style=\"font-size:13px; font-weight:700; letter-spacing:1.4px; text-transform:uppercase; color:#0d9488\">Features<\u002Fdiv>\n        <h2 class=\"rf-h2\" style=\"margin:12px 0 0 0; font-size:38px; font-weight:800; letter-spacing:-1px\">Everything your reputation needs<\u002Fh2>\n        <p style=\"margin:14px 0 0 0; font-size:16px; line-height:1.6; color:#64748b\">Fair to every customer, honest with every review, and built to save you time.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- Feature 1: WhatsApp requests -->\n      <div class=\"rf-feat\" style=\"display:grid; grid-template-columns:1fr 1fr; gap:56px; align-items:center; margin-top:72px\">\n        <div>\n          <img src=\"448fa16b-b292-4e14-bda0-fea2f35db24d\" alt=\"\" style=\"width:52px; display:block\">\n          <h3 style=\"margin:18px 0 0 0; font-size:26px; font-weight:800; letter-spacing:-0.5px\">Review requests where they'll actually be seen<\u002Fh3>\n          <p style=\"margin:12px 0 0 0; font-size:15.5px; line-height:1.65; color:#475569\">After each visit, ReviewFlow sends your customer a friendly WhatsApp message, with SMS fallback for anyone not on WhatsApp. No printing cards, no awkward asks at the till, no emails that sit unread.<\u002Fp>\n          <div style=\"margin-top:16px; font-size:14px; line-height:1.9; color:#334155\">\n            <div>✓&nbsp; Sent automatically, minutes after the visit<\u002Fdiv>\n            <div>✓&nbsp; Personalised with the customer's name<\u002Fdiv>\n            <div>✓&nbsp; Opt-out (STOP) always honoured<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#ffffff; border:1px solid #e8edf0; border-radius:20px; padding:28px; box-shadow:0 10px 30px rgba(15,23,42,0.06); display:flex; justify-content:center\">\n          <img src=\"ec4059e6-7892-416a-803b-e2e86ea31ff3\" alt=\"WhatsApp review request example\" style=\"width:100%; max-width:380px; display:block\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Feature 2: Private feedback -->\n      <div class=\"rf-feat\" style=\"display:grid; grid-template-columns:1fr 1fr; gap:56px; align-items:center; margin-top:80px\">\n        <div style=\"order:2\">\n          <img src=\"8693e2bb-715f-4bef-9c29-c6689487034f\" alt=\"\" style=\"width:52px; display:block\">\n          <h3 style=\"margin:18px 0 0 0; font-size:26px; font-weight:800; letter-spacing:-0.5px\">Problems reach you first, not your Google listing<\u002Fh3>\n          <p style=\"margin:12px 0 0 0; font-size:15.5px; line-height:1.65; color:#475569\">Every customer sees the same two options: leave a Google review, or message you privately. It's even-handed and compliant, and it means an unhappy customer talks to you while there's still time to put things right.<\u002Fp>\n          <div style=\"margin-top:16px; background:#e6f4f2; border-radius:12px; padding:14px 18px; font-size:13.5px; line-height:1.6; color:#0b5f57\"><strong>Not review gating.<\u002Fstrong> Everyone gets the same choices, whatever their experience. That keeps you on the right side of Google's policies and UK consumer law.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"order:1; background:#ffffff; border:1px solid #e8edf0; border-radius:20px; padding:34px; box-shadow:0 10px 30px rgba(15,23,42,0.06)\">\n          <div style=\"font-size:13px; font-weight:700; color:#64748b; margin-bottom:14px\">Private feedback · this morning<\u002Fdiv>\n          <div style=\"background:#f8fafc; border-radius:14px; padding:16px 18px; border:1px solid #eef2f4\">\n            <div style=\"display:flex; align-items:center; gap:10px\">\n              <div style=\"width:34px; height:34px; border-radius:17px; background:#e6f4f2; color:#0d9488; font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center\">J<\u002Fdiv>\n              <div><div style=\"font-size:14px; font-weight:700\">Jenny M.<\u002Fdiv><div style=\"font-size:12px; color:#94a3b8\">via WhatsApp · private<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:14px; line-height:1.6; color:#334155; margin-top:12px\">\"The wait was longer than I was told, 40 minutes past my slot. Otherwise lovely as always.\"<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:10px; margin-top:14px\">\n            <div style=\"flex:1; text-align:center; background:#0d9488; color:#fff; font-size:13.5px; font-weight:700; border-radius:10px; padding:11px\">Reply privately<\u002Fdiv>\n            <div style=\"flex:1; text-align:center; background:#fff; color:#334155; font-size:13.5px; font-weight:700; border-radius:10px; padding:11px; border:1.5px solid #e2e8f0\">Mark resolved<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:12.5px; color:#94a3b8; margin-top:14px; text-align:center\">Seen by you and your team. Never published anywhere.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Feature 3: Inbox + AI -->\n      <div class=\"rf-feat
